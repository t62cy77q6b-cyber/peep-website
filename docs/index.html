<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peep</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d0d0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -2px;
      color: #ffffff;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 20px;
      font-weight: 500;
      color: #ab9ff2;
      margin-bottom: 32px;
    }

    .description {
      font-size: 16px;
      line-height: 1.7;
      color: #a0a0b0;
      margin-bottom: 48px;
    }

    .appstore-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #1a3a6b;
      color: #ffffff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }

    .appstore-btn svg {
      width: 22px;
      height: 22px;
      fill: #ffffff;
    }

    .coming-soon {
      margin-top: 12px;
      font-size: 13px;
      color: #555570;
    }

    footer {
      margin-top: 64px;
      font-size: 13px;
      color: #444455;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Peep</div>
    <div class="tagline">Trade digital cards on Solana</div>
    <p class="description">
      Peep lets you mint your own digital trading card, collect cards from people you meet,
      and trade them peer-to-peer on the Solana blockchain. Every card is a compressed NFT —
      scarce, tradeable, and yours.
    </p>
    <a class="appstore-btn" href="#">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Download on the App Store
    </a>
    <div class="coming-soon">Coming soon</div>
  </div>
  <footer>peep.app</footer>
</body>
</html>
